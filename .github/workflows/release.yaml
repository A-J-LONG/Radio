name: Build and Release Radio

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if (Test-Path requirements.txt) {
            (Get-Content requirements.txt) | Where-Object { $_ -notmatch 'pygame' } | Set-Content requirements.txt
            pip install -r requirements.txt
          }

      - name: Build Windows EXE (onefile)
        # Kept on a single line to fix the PowerShell multi-line parsing crash
        run: pyinstaller --onefile --console --noconfirm --clean --distpath dist/windows --workpath build/windows --specpath . --add-data "bin/FFmpeg/Windows;bin/FFmpeg/Windows" Radio.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: radio-windows
          path: dist/windows/

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if [ -f requirements.txt ]; then
            sed -i '/pygame/d' requirements.txt
            pip install -r requirements.txt
          fi

      - name: Build Linux binary (onefile)
        # Changed --specpath to "." so PyInstaller roots its asset-search out of your main directory
        run: pyinstaller --onefile --console --noconfirm --clean --distpath dist/linux --workpath build/linux --specpath . --add-data "bin/FFmpeg/Linux:bin/FFmpeg/Linux" Radio.py

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: radio-linux
          path: dist/linux/

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: radio-windows
          path: release/windows

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: radio-linux
          path: release/linux

      - name: Rename binaries
        run: |
          mv release/windows/Radio.exe radio-windows.exe
          mv release/linux/Radio radio-linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            radio-windows.exe
            radio-linux